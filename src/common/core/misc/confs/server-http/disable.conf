{%- if DISABLE_DEFAULT_SERVER_STRICT_SNI == "yes" -%}
ssl_client_hello_by_lua_block {
	-- No-op: SNI validation is performed by the default server when SNI does
	-- not match any configured server (see
	-- src/common/core/misc/confs/default-server-http/disable.conf). A
	-- per-service block only runs after NGINX matched the SNI to this
	-- server's server_name, so revalidating here would be redundant.
	--
	-- Required because OpenResty's lua-nginx-module calls NGINX 1.30+'s
	-- ngx_ssl_client_hello_callback (which performs SNI selection during the
	-- client-hello phase) before resolving the per-server lua handler. If the
	-- SNI-matched server has no ssl_client_hello_by_lua* directive, the module
	-- aborts the handshake with "no ssl_client_hello_by_lua* defined in
	-- server <name>". This empty block satisfies that contract.
	--
	-- An http-main-level shim was tried instead but rejected by the lua
	-- module's per-server merge ("no ssl configured for the server") because
	-- BunkerWeb has http-only servers (e.g. the internal healthcheck server)
	-- that the inheritance would have unconditionally targeted. Keeping the
	-- shim per-service avoids that.
	return
}
{%- endif %}
