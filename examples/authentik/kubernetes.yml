apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress
  annotations:
    bunkerweb.io/AUTO_LETS_ENCRYPT: "yes"
    # Outpost proxy — exposes /outpost.goauthentik.io on every protected site
    # (and on auth.example.com itself) so the Authentik embedded outpost can
    # handle the auth_request subrequest and the signin redirect flow.
    bunkerweb.io/REVERSE_PROXY_URL_999: "/outpost.goauthentik.io"
    bunkerweb.io/REVERSE_PROXY_HOST_999: "http://authentik-server.default.svc.cluster.local"
    bunkerweb.io/REVERSE_PROXY_HEADERS_999: 'X-Original-URL $scheme://$http_host$request_uri;Content-Length ""'
    bunkerweb.io/REVERSE_PROXY_HEADERS_CLIENT_999: "Set-Cookie $auth_cookie"
    bunkerweb.io/REVERSE_PROXY_AUTH_REQUEST_SET_999: "$auth_cookie $upstream_http_set_cookie"
    bunkerweb.io/REVERSE_PROXY_PASS_REQUEST_BODY_999: "no"
    # Authentik server (login, admin, flows)
    bunkerweb.io/auth.example.com_REVERSE_PROXY_WS_1: "yes"
    bunkerweb.io/auth.example.com_LIMIT_REQ_URL_1: "^/api/"
    bunkerweb.io/auth.example.com_LIMIT_REQ_RATE_1: "5r/s"
    bunkerweb.io/auth.example.com_REVERSE_PROXY_INTERCEPT_ERRORS: "no"
    bunkerweb.io/auth.example.com_ALLOWED_METHODS: "GET|POST|HEAD|PUT|DELETE|PATCH"
    bunkerweb.io/auth.example.com_COOKIE_FLAGS: "* SameSite=Lax"
    # app1 — protected by Authentik Forward Auth. The `_1` suffix matches the
    # suffix that the BunkerWeb Kubernetes controller assigns to the primary
    # Ingress backend, so the auth_request block lands on the `location /`.
    bunkerweb.io/app1.example.com_INTERCEPTED_ERROR_CODES: "400 403 404 405 413 429 500 501 502 503 504"
    bunkerweb.io/app1.example.com_REVERSE_PROXY_AUTH_REQUEST_1: "/outpost.goauthentik.io/auth/nginx"
    bunkerweb.io/app1.example.com_REVERSE_PROXY_AUTH_REQUEST_SIGNIN_URL_1: "https://app1.example.com/outpost.goauthentik.io/start?rd=$scheme%3A%2F%2F$host$request_uri"
    bunkerweb.io/app1.example.com_REVERSE_PROXY_AUTH_REQUEST_SET_1: "$auth_cookie $upstream_http_set_cookie;$authentik_username $upstream_http_x_authentik_username;$authentik_groups $upstream_http_x_authentik_groups;$authentik_entitlements $upstream_http_x_authentik_entitlements;$authentik_email $upstream_http_x_authentik_email;$authentik_name $upstream_http_x_authentik_name;$authentik_uid $upstream_http_x_authentik_uid"
    bunkerweb.io/app1.example.com_REVERSE_PROXY_HEADERS_CLIENT_1: "Set-Cookie $auth_cookie"
    bunkerweb.io/app1.example.com_REVERSE_PROXY_HEADERS_1: "X-authentik-username $authentik_username;X-authentik-groups $authentik_groups;X-authentik-entitlements $authentik_entitlements;X-authentik-email $authentik_email;X-authentik-name $authentik_name;X-authentik-uid $authentik_uid"
    # app2 — protected by Authentik Forward Auth (same `_1` suffix rule)
    bunkerweb.io/app2.example.com_INTERCEPTED_ERROR_CODES: "400 403 404 405 413 429 500 501 502 503 504"
    bunkerweb.io/app2.example.com_REVERSE_PROXY_AUTH_REQUEST_1: "/outpost.goauthentik.io/auth/nginx"
    bunkerweb.io/app2.example.com_REVERSE_PROXY_AUTH_REQUEST_SIGNIN_URL_1: "https://app2.example.com/outpost.goauthentik.io/start?rd=$scheme%3A%2F%2F$host$request_uri"
    bunkerweb.io/app2.example.com_REVERSE_PROXY_AUTH_REQUEST_SET_1: "$auth_cookie $upstream_http_set_cookie;$authentik_username $upstream_http_x_authentik_username;$authentik_groups $upstream_http_x_authentik_groups;$authentik_entitlements $upstream_http_x_authentik_entitlements;$authentik_email $upstream_http_x_authentik_email;$authentik_name $upstream_http_x_authentik_name;$authentik_uid $upstream_http_x_authentik_uid"
    bunkerweb.io/app2.example.com_REVERSE_PROXY_HEADERS_CLIENT_1: "Set-Cookie $auth_cookie"
    bunkerweb.io/app2.example.com_REVERSE_PROXY_HEADERS_1: "X-authentik-username $authentik_username;X-authentik-groups $authentik_groups;X-authentik-entitlements $authentik_entitlements;X-authentik-email $authentik_email;X-authentik-name $authentik_name;X-authentik-uid $authentik_uid"
spec:
  rules:
    - host: auth.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: authentik-server
                port:
                  number: 80
    - host: app1.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: svc-app1
                port:
                  number: 80
    - host: app2.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: svc-app2
                port:
                  number: 80
---
# Demo application 1
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
  labels:
    app: app1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app1
  template:
    metadata:
      labels:
        app: app1
    spec:
      containers:
        - name: app1
          image: nginxdemos/nginx-hello
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: svc-app1
spec:
  selector:
    app: app1
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
---
# Demo application 2
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app2
  labels:
    app: app2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app2
  template:
    metadata:
      labels:
        app: app2
    spec:
      containers:
        - name: app2
          image: nginxdemos/nginx-hello
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: svc-app2
spec:
  selector:
    app: app2
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
